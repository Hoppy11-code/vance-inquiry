<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Vance Inquiry — Teacher Console</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  :root{--purple:#672E8D;--gold:#A1916A;--rust:#c1532d;--panel:#15131c;--panel2:#1d1a26;--ink:#ece9f2;--mute:#9a93a8;--good:#46b86a;--goodglow:#7ee0a0;}
  *{box-sizing:border-box;}
  body{margin:0;background:#08070c;font-family:Aptos,Calibri,Arial,sans-serif;color:var(--ink);}
  .shell{max-width:1180px;margin:0 auto;background:radial-gradient(circle at 50% -10%,#2a1830 0%,#0d0b12 60%);min-height:100vh;}
  .band{background:linear-gradient(90deg,var(--purple) 0%,#3f1c57 100%);padding:16px 26px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--gold);}
  .band .t{font-weight:800;font-size:15px;letter-spacing:2px;}
  .band .r{font-size:12px;color:var(--gold);letter-spacing:1px;}
  .wrap{padding:30px 36px;}
  button{font-family:inherit;border:none;border-radius:9px;font-weight:700;cursor:pointer;}
  .btn-rust{background:var(--rust);color:#fff;padding:13px 26px;font-size:16px;}
  .btn-gold{background:var(--gold);color:#1a1320;padding:13px 26px;font-size:16px;}
  .btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.3);padding:11px 20px;font-size:14px;}
  .btn-rust:disabled,.btn-gold:disabled{opacity:.45;cursor:default;}
  h1{font-family:Georgia,serif;font-size:34px;font-weight:800;color:#fff;margin:0 0 4px;}
  .seg{display:inline-flex;border:1px solid rgba(255,255,255,.15);border-radius:12px;overflow:hidden;}
  .seg button{background:transparent;color:#fff;padding:14px 26px;font-size:15px;border-right:1px solid rgba(255,255,255,.12);}
  .seg button:last-child{border-right:none;}
  .seg button.on{background:var(--gold);color:#1a1320;}
  .seg .blurb{display:block;font-size:11px;font-weight:600;opacity:.8;margin-top:3px;max-width:220px;}
  .card{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px;}
  /* live layout */
  .live{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;}
  .qrcard{background:#fff;border-radius:18px;padding:22px;text-align:center;}
  .qrcard canvas{width:260px!important;height:260px!important;}
  .code{font-family:Georgia,serif;font-size:52px;font-weight:800;letter-spacing:10px;color:var(--purple);margin-top:10px;}
  .joinurl{font-size:12px;color:#555;margin-top:6px;word-break:break-all;}
  .stat{display:flex;gap:22px;margin-bottom:16px;}
  .stat .b{background:var(--panel2);border-radius:10px;padding:12px 18px;text-align:center;min-width:90px;}
  .stat .n{font-size:26px;font-weight:800;color:#fff;}
  .stat .l{font-size:11px;color:var(--mute);letter-spacing:1px;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;color:var(--gold);letter-spacing:1px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.1);}
  td{padding:11px 10px;border-bottom:1px solid rgba(255,255,255,.05);font-size:15px;}
  .rank{color:var(--mute);font-weight:800;width:36px;}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
  .pill.in{background:rgba(70,184,106,.18);color:var(--goodglow);border:1px solid rgba(70,184,106,.5);}
  .pill.wait{background:rgba(255,255,255,.06);color:var(--mute);border:1px solid rgba(255,255,255,.1);}
  .pill.right{background:rgba(70,184,106,.2);color:var(--goodglow);}
  .pill.wrong{background:rgba(193,83,45,.2);color:#f0a08e;}
  .intelbar{height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;width:120px;display:inline-block;vertical-align:middle;}
  .intelbar>div{height:100%;background:var(--gold);}
  .reveal{background:rgba(193,83,45,.12);border:1px solid var(--rust);border-radius:12px;padding:16px 20px;margin-bottom:18px;font-size:15px;}
  @media(max-width:820px){.live{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="shell">
  <div class="band"><div class="t">THE VANCE INQUIRY · TEACHER CONSOLE</div><div class="r">SAMIAD</div></div>
  <div class="wrap" id="view"></div>
</div>

<script>
const API_BASE = (new URLSearchParams(location.search).get("api") || location.origin).replace(/\/$/,"");
const PURPLE="#672E8D",GOLD="#A1916A",RUST="#c1532d",GOOD="#46b86a",GOODGLOW="#7ee0a0";
const view = document.getElementById("view");
const esc = s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let DIFFS = {}, chosen = "intermediate", session = null, pollTimer = null, lastClose = null;

async function boot(){
  try{ const r = await fetch(API_BASE+"/api/witnesses"); const d = await r.json(); DIFFS = d.difficulties; }
  catch(e){ DIFFS = {beginner:{label:"Beginner",blurb:""},intermediate:{label:"Intermediate",blurb:""},advanced:{label:"Advanced",blurb:""}}; }
  renderSetup();
}

function renderSetup(){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  view.innerHTML = `
    <h1>Start an investigation</h1>
    <div style="color:#cfc9da;font-size:15px;margin-bottom:24px;">Pick the difficulty for this class. It sets the witnesses' English level and how hard they are to crack.</div>
    <div class="seg" id="seg">
      ${Object.entries(DIFFS).map(([k,v])=>`<button class="${k===chosen?'on':''}" onclick="pick('${k}')">${esc(v.label)}<span class="blurb">${esc(v.blurb||'')}</span></button>`).join("")}
    </div>
    <div style="margin-top:30px;"><button class="btn-rust" onclick="createSession()">Create session & show QR →</button></div>
    <div style="margin-top:28px;font-size:13px;color:var(--mute);">Students will scan the QR or type the 4-letter code. Nothing to install, no logins.</div>
  `;
}
function pick(k){ chosen=k; document.querySelectorAll("#seg button").forEach(b=>b.classList.remove("on")); event.target.closest("button").classList.add("on"); }

async function createSession(){
  try{
    const r = await fetch(API_BASE+"/api/session/create",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({difficulty:chosen})});
    session = await r.json(); lastClose=null;
    renderLive();
    pollTimer = setInterval(refresh, 2500);
  }catch(e){ alert("Couldn't create the session. Is the server running?"); }
}

function joinURL(){ return API_BASE + "/?code=" + session.code; }

function renderLive(){
  const diffLabel = (DIFFS[session.difficulty]||{}).label || session.difficulty;
  view.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;">
      <h1 style="margin:0;">Round live · <span style="color:${GOLD}">${esc(diffLabel)}</span></h1>
      <div style="display:flex;gap:10px;">
        <button class="btn-gold" onclick="closeRound()">Close round & reveal</button>
        <button class="btn-ghost" onclick="renderSetup()">New round</button>
      </div>
    </div>
    <div class="live">
      <div>
        <div class="qrcard">
          <div style="font-size:13px;color:#555;font-weight:700;letter-spacing:1px;">SCAN TO JOIN</div>
          <canvas id="qr"></canvas>
          <div class="code">${esc(session.code)}</div>
          <div class="joinurl">${esc(joinURL())}</div>
        </div>
      </div>
      <div class="card">
        <div class="stat">
          <div class="b"><div class="n" id="s-joined">0</div><div class="l">JOINED</div></div>
          <div class="b"><div class="n" id="s-locked">0</div><div class="l">LOCKED IN</div></div>
          <div class="b"><div class="n" id="s-correct">0</div><div class="l">CORRECT</div></div>
        </div>
        <div id="board"><div style="color:var(--mute);font-size:14px;padding:10px 4px;">Waiting for students to join…</div></div>
      </div>
    </div>`;
  QRCode.toCanvas(document.getElementById("qr"), joinURL(), {width:260,margin:1,color:{dark:"#672E8D",light:"#ffffff"}});
  refresh();
}

async function refresh(){
  if(!session) return;
  try{
    const r = await fetch(API_BASE+"/api/session/"+session.code+"/scoreboard");
    const d = await r.json();
    document.getElementById("s-joined").textContent = d.joined;
    document.getElementById("s-locked").textContent = d.lockedCount;
    document.getElementById("s-correct").textContent = d.players.filter(p=>p.correct).length;
    renderBoard(d.players, d.totalIntel, d.open);
  }catch(e){}
}

function renderBoard(players, total, open){
  const board = document.getElementById("board");
  if(!board) return;
  if(!players.length){ board.innerHTML = `<div style="color:var(--mute);font-size:14px;padding:10px 4px;">Waiting for students to join…</div>`; return; }
  board.innerHTML = `<table><thead><tr><th></th><th>NAME</th><th>INTEL</th><th>STATUS</th></tr></thead><tbody>
    ${players.map((p,i)=>{
      const pct = Math.round((p.intel/total)*100);
      let status;
      if(p.locked) status = p.correct
        ? `<span class="pill right">✓ correct</span>`
        : (lastClose ? `<span class="pill wrong">✗ wrong</span>` : `<span class="pill in">locked in</span>`);
      else status = `<span class="pill wait">investigating</span>`;
      return `<tr>
        <td class="rank">${i+1}</td>
        <td style="font-weight:700;">${esc(p.name)}</td>
        <td><span class="intelbar"><div style="width:${pct}%"></div></span> <span style="font-size:13px;color:var(--mute);">${p.intel}/${total}</span></td>
        <td>${status}</td>
      </tr>`;
    }).join("")}
  </tbody></table>`;
}

async function closeRound(){
  if(!session) return;
  try{
    const r = await fetch(API_BASE+"/api/session/close",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:session.code})});
    lastClose = await r.json();
    if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
    const players = lastClose.scoreboard;
    const total = players.reduce((m,p)=>Math.max(m,p.intel),16);
    const diffLabel = (DIFFS[session.difficulty]||{}).label || session.difficulty;
    const correct = players.filter(p=>p.correct).length;
    view.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;">
        <h1 style="margin:0;">Round results · <span style="color:${GOLD}">${esc(diffLabel)}</span></h1>
        <button class="btn-rust" onclick="renderSetup()">Launch new investigation →</button>
      </div>
      <div class="reveal"><b style="color:#fff;">The killer was ${esc(lastClose.killerName)}.</b> &nbsp; ${correct} of ${players.length} investigator${players.length===1?'':'s'} got it right.</div>
      <div class="card">
        <div id="board"></div>
      </div>`;
    renderBoard(players, 16, false);
  }catch(e){ alert("Couldn't close the round."); }
}

boot();
</script>
</body>
</html>
